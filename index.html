<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="index, follow">
<title>HomeOp Legal</title>
<style>
  :root {
    --cream: #faf6ef;
    --warm100: #f3ece0;
    --warm200: #e7dcca;
    --stone800: #2b2620;
    --stone700: #443d33;
    --stone600: #5c5345;
    --stone500: #8a7f6d;
    --teal: #0f766e;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh;
    background: var(--cream);
    color: var(--stone700);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    font-size: 17px; line-height: 1.65;
    display: flex; align-items: center; justify-content: center;
    -webkit-font-smoothing: antialiased;
  }
  .card { max-width: 560px; padding: 48px 28px; text-align: center; }
  .eyebrow {
    font-size: 12px; font-weight: 700; letter-spacing: 1.4px;
    text-transform: uppercase; color: var(--stone500); margin: 0 0 12px;
  }
  h1 {
    font-family: Georgia, "Times New Roman", serif;
    font-weight: 600; color: var(--stone800);
    font-size: 40px; line-height: 1.15; margin: 0 0 14px;
  }
  p.lead { font-size: 18px; color: var(--stone600); margin: 0 auto 32px; max-width: 460px; }
  .links { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; }
  .links a {
    display: inline-block; text-decoration: none;
    background: #fff; border: 1px solid var(--warm200);
    border-radius: 14px; padding: 14px 24px;
    color: var(--stone800); font-weight: 600;
    box-shadow: 0 4px 14px rgba(30,24,16,0.05);
    transition: transform .15s ease, box-shadow .15s ease;
  }
  .links a:hover { transform: translateY(-2px); box-shadow: 0 8px 22px rgba(30,24,16,0.08); }
  footer { margin-top: 40px; color: var(--stone500); font-size: 14px; }
  footer a { color: var(--teal); text-decoration: none; }
</style>
</head>
<body>
  <div class="card">
    <p class="eyebrow">The Family Vault</p>
    <h1>HomeOp</h1>
    <p class="lead">The legal home for HomeOp. Here you can read how the app handles your information and the terms that govern its use.</p>
    <div class="links">
      <a href="privacy.html">Privacy Policy</a>
      <a href="terms.html">Terms of Service</a>
    </div>
    <footer>
      <p>&copy; 2026 Brandon Docusen. Questions? <a href="mailto:b.docusen@me.com">b.docusen@me.com</a></p>
    </footer>
  </div>
</body>
</html>
